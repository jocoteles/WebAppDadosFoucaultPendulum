# Workflow para deploy no GitHub Pages
# Este workflow injeta as chaves do Firebase a partir dos GitHub Secrets antes do deploy.

name: Deploy Estático do Pêndulo

on:
  push:
    branches: ["master"] # Mude para a sua branch principal se necessário
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Listar arquivos para debug
        run: |
          ls -R

      - name: Criar config.js a partir dos Secrets
        run: |
          echo "const firebaseConfig = {" > config.js
          echo "    apiKey: \"${{ secrets.FIREBASE_API_KEY }}\"," >> config.js
          echo "    authDomain: \"${{ secrets.FIREBASE_AUTH_DOMAIN }}\"," >> config.js
          echo "    databaseURL: \"${{ secrets.FIREBASE_DATABASE_URL }}\"," >> config.js
          echo "    projectId: \"${{ secrets.FIREBASE_PROJECT_ID }}\"," >> config.js
          echo "    storageBucket: \"${{ secrets.FIREBASE_STORAGE_BUCKET }}\"," >> config.js
          echo "    messagingSenderId: \"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}\"," >> config.js
          echo "    appId: \"${{ secrets.FIREBASE_APP_ID }}\"" >> config.js
          echo "};" >> config.js
          echo "const APP_CHECK_PUBLIC_KEY = '${{ secrets.APP_CHECK_PUBLIC_KEY }}';" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
